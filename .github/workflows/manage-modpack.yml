name: Manage Modpack

# Create, reconfigure, or delete a modpack definition under modpacks/<name>/.
# Triggered by the Discord bot's /modpack command (authored-user only — enforced
# in the bot, not here, so don't expose this workflow_dispatch to anyone else
# with repo write access without adding your own guard).
#
# IMPORTANT: this workflow does NOT download mods/jars/resourcepacks and does
# NOT commit them to the repo. GitHub hard-rejects any file >100MB (and warns
# above 50MB), and modpacks like Cobbleverse blow way past that. Instead this
# workflow only records *where* to get the modpack (jar_url / mrpack_slug /
# curseforge_project_id) in
# modpacks/<name>/meta.json. The actual download/build happens fresh on every
# run in start-server.yml, on the ephemeral runner, and is never committed.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        type: choice
        options:
          - create
          - configure
          - delete
      modpack_name:
        description: 'Short id, lowercase, no spaces (e.g. atm9)'
        required: true
      jar_url:
        description: 'Direct download URL for server jar OR a server-pack .zip. Leave blank if using mrpack_slug instead. On configure, leave blank to keep current value.'
        required: false
      is_zip:
        description: 'Is jar_url a .zip server pack that needs extracting? (create only — cannot be changed later; delete + recreate if you need to switch)'
        required: false
        type: boolean
        default: false
      mrpack_slug:
        description: 'Modrinth modpack slug or project id, e.g. cobbleverse. Alternative to jar_url — builds the server via mrpack-install instead. On configure, leave blank to keep current value.'
        required: false
      mrpack_version:
        description: 'Specific Modrinth version number/id for mrpack_slug. Leave blank for latest / to keep current value.'
        required: false
      curseforge_project_id:
        description: 'CurseForge project (mod) id, e.g. 715572. Alternative to jar_url/mrpack_slug. Needs CURSEFORGE_API_KEY repo secret. On configure, leave blank to keep current value.'
        required: false
      curseforge_file_id:
        description: 'Specific CurseForge file id for curseforge_project_id. Leave blank for latest file / to keep current value.'
        required: false
      server_port:
        description: 'Minecraft server port (create: defaults to 25565 if blank. configure: leave blank to keep current value). Must match whatever local port you pointed this modpack''s playit.gg tunnel at — does not need to differ from other modpacks.'
        required: false
      tunnel_address:
        description: 'playit.gg tunnel address for this modpack, e.g. myserver.playit.gg:12345 (create/configure: leave blank to keep current value on configure). Set this up on playit.gg pointed at the port above BEFORE starting the server.'
        required: false
      java_version:
        description: 'Java version (create: defaults to 25 if blank. configure: leave blank to keep current value)'
        required: false
      memory_gb:
        description: 'Xmx memory in GB (create: defaults to 10 if blank. configure: leave blank to keep current value). Runner has 16GB total.'
        required: false
      server_jar:
        description: 'Runnable jar filename, jar/zip mode only (create: defaults to server.jar if blank. configure: leave blank to keep current value). For mrpack_slug this is usually auto-detected at server start.'
        required: false
      launch_mode:
        description: 'jar (java -jar, default) or script (run a shipped start.sh). Blank on configure keeps current value.'
        required: false
        type: choice
        options:
          - ''
          - jar
          - script
      start_script:
        description: 'Script filename for script mode, e.g. start.sh (create: defaults to start.sh if blank. configure: leave blank to keep current value)'
        required: false
      delete_world:
        description: 'Also delete the saved world data? (delete only)'
        required: false
        type: boolean
        default: false

jobs:
  manage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "minecraft-bot"
          git config user.email "actions@github.com"
          git config core.fileMode false

      - name: Validate modpack name
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          ACTION="${{ github.event.inputs.action }}"
          if ! [[ "$NAME" =~ ^[a-z0-9][a-z0-9_-]*$ ]]; then
            echo "::error::modpack_name must be lowercase alphanumeric (with - or _), got: $NAME"
            exit 1
          fi
          if [ "$NAME" = "vanilla" ] && { [ "$ACTION" = "create" ] || [ "$ACTION" = "delete" ]; }; then
            echo "::error::'vanilla' has dynamic version-download logic baked into start-server.yml — it can't be created or deleted this way. 'configure' (memory/java) is fine."
            exit 1
          fi

      # ---------------- CREATE ----------------
      - name: Create - validate source inputs
        if: github.event.inputs.action == 'create'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          JAR_URL="${{ github.event.inputs.jar_url }}"
          MRPACK_SLUG="${{ github.event.inputs.mrpack_slug }}"
          CURSEFORGE_PROJECT_ID="${{ github.event.inputs.curseforge_project_id }}"

          if [ -d "modpacks/$NAME" ]; then
            echo "::error::modpacks/$NAME already exists. Use 'configure' to change it, or delete it first."
            exit 1
          fi

          SOURCE_COUNT=0
          [ -n "$JAR_URL" ] && SOURCE_COUNT=$((SOURCE_COUNT + 1))
          [ -n "$MRPACK_SLUG" ] && SOURCE_COUNT=$((SOURCE_COUNT + 1))
          [ -n "$CURSEFORGE_PROJECT_ID" ] && SOURCE_COUNT=$((SOURCE_COUNT + 1))

          if [ "$SOURCE_COUNT" -eq 0 ]; then
            echo "::error::Provide one of jar_url, mrpack_slug, or curseforge_project_id for 'create'."
            exit 1
          fi
          if [ "$SOURCE_COUNT" -gt 1 ]; then
            echo "::error::Provide only one of jar_url, mrpack_slug, or curseforge_project_id, not more than one."
            exit 1
          fi

          mkdir -p "modpacks/$NAME"

          if [ ! -f "modpacks/$NAME/server.properties" ]; then
            cat > "modpacks/$NAME/server.properties" <<'EOF'
          motd=A Minecraft Server
          max-players=20
          view-distance=10
          difficulty=normal
          gamemode=survival
          online-mode=false
          EOF
          fi

      # ---------------- CREATE + CONFIGURE (shared meta.json step) ----------------
      - name: Write meta.json
        if: github.event.inputs.action == 'create' || github.event.inputs.action == 'configure'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          ACTION="${{ github.event.inputs.action }}"
          META="modpacks/$NAME/meta.json"

          if [ "$ACTION" = "configure" ] && [ "$NAME" != "vanilla" ] && [ ! -d "modpacks/$NAME" ]; then
            echo "::error::modpacks/$NAME does not exist. Use 'create' first."
            exit 1
          fi
          mkdir -p "modpacks/$NAME"

          # Start from existing meta.json if present (configure), else hardcoded defaults (create)
          if [ -f "$META" ]; then
            CUR_JAVA=$(jq -r '.java_version // "25"' "$META")
            CUR_MEM=$(jq -r '.memory_gb // "10"' "$META")
            CUR_JAR=$(jq -r '.server_jar // "server.jar"' "$META")
            CUR_MODE=$(jq -r '.launch_mode // "jar"' "$META")
            CUR_SCRIPT=$(jq -r '.start_script // "start.sh"' "$META")
            CUR_PORT=$(jq -r '.server_port // "25565"' "$META")
            CUR_SOURCE_TYPE=$(jq -r '.source_type // "jar"' "$META")
            CUR_JAR_URL=$(jq -r '.jar_url // ""' "$META")
            CUR_IS_ZIP=$(jq -r '.is_zip // "false"' "$META")
            CUR_MRPACK_SLUG=$(jq -r '.mrpack_slug // ""' "$META")
            CUR_MRPACK_VERSION=$(jq -r '.mrpack_version // ""' "$META")
            CUR_TUNNEL_ADDRESS=$(jq -r '.tunnel_address // ""' "$META")
            CUR_CURSEFORGE_PROJECT_ID=$(jq -r '.curseforge_project_id // ""' "$META")
            CUR_CURSEFORGE_FILE_ID=$(jq -r '.curseforge_file_id // ""' "$META")
          else
            CUR_JAVA="25"
            CUR_MEM="10"
            CUR_JAR="server.jar"
            CUR_MODE="jar"
            CUR_SCRIPT="start.sh"
            CUR_PORT="25565"
            CUR_SOURCE_TYPE="jar"
            CUR_JAR_URL=""
            CUR_IS_ZIP="false"
            CUR_MRPACK_SLUG=""
            CUR_MRPACK_VERSION=""
            CUR_TUNNEL_ADDRESS=""
            CUR_CURSEFORGE_PROJECT_ID=""
            CUR_CURSEFORGE_FILE_ID=""
          fi

          # Only override a field if the corresponding input was actually provided
          IN_JAVA="${{ github.event.inputs.java_version }}"
          IN_MEM="${{ github.event.inputs.memory_gb }}"
          IN_JAR="${{ github.event.inputs.server_jar }}"
          IN_MODE="${{ github.event.inputs.launch_mode }}"
          IN_SCRIPT="${{ github.event.inputs.start_script }}"
          IN_PORT="${{ github.event.inputs.server_port }}"
          IN_TUNNEL_ADDRESS="${{ github.event.inputs.tunnel_address }}"
          IN_JAR_URL="${{ github.event.inputs.jar_url }}"
          IN_MRPACK_SLUG="${{ github.event.inputs.mrpack_slug }}"
          IN_MRPACK_VERSION="${{ github.event.inputs.mrpack_version }}"
          IN_IS_ZIP="${{ github.event.inputs.is_zip }}"
          IN_CURSEFORGE_PROJECT_ID="${{ github.event.inputs.curseforge_project_id }}"
          IN_CURSEFORGE_FILE_ID="${{ github.event.inputs.curseforge_file_id }}"

          FINAL_JAVA="${IN_JAVA:-$CUR_JAVA}"
          FINAL_MEM="${IN_MEM:-$CUR_MEM}"
          FINAL_JAR="${IN_JAR:-$CUR_JAR}"
          FINAL_MODE="${IN_MODE:-$CUR_MODE}"
          FINAL_SCRIPT="${IN_SCRIPT:-$CUR_SCRIPT}"
          FINAL_PORT="${IN_PORT:-$CUR_PORT}"
          FINAL_TUNNEL_ADDRESS="${IN_TUNNEL_ADDRESS:-$CUR_TUNNEL_ADDRESS}"

          # is_zip is only meaningful/settable at create time (boolean inputs
          # can't distinguish "not provided" from "false" on configure).
          if [ "$ACTION" = "create" ]; then
            FINAL_IS_ZIP="$IN_IS_ZIP"
          else
            FINAL_IS_ZIP="$CUR_IS_ZIP"
          fi

          # Resolve source: mrpack_slug, jar_url, and curseforge_project_id
          # are mutually exclusive. On configure, whichever one the user just
          # provided wins and clears the other two.
          if [ -n "$IN_MRPACK_SLUG" ]; then
            FINAL_SOURCE_TYPE="mrpack"
            FINAL_MRPACK_SLUG="$IN_MRPACK_SLUG"
            FINAL_MRPACK_VERSION="${IN_MRPACK_VERSION:-$CUR_MRPACK_VERSION}"
            FINAL_JAR_URL=""
            FINAL_CURSEFORGE_PROJECT_ID=""
            FINAL_CURSEFORGE_FILE_ID=""
          elif [ -n "$IN_JAR_URL" ]; then
            FINAL_SOURCE_TYPE=$([ "$FINAL_IS_ZIP" = "true" ] && echo "zip" || echo "jar")
            FINAL_JAR_URL="$IN_JAR_URL"
            FINAL_MRPACK_SLUG=""
            FINAL_MRPACK_VERSION=""
            FINAL_CURSEFORGE_PROJECT_ID=""
            FINAL_CURSEFORGE_FILE_ID=""
          elif [ -n "$IN_CURSEFORGE_PROJECT_ID" ]; then
            FINAL_SOURCE_TYPE="curseforge"
            FINAL_CURSEFORGE_PROJECT_ID="$IN_CURSEFORGE_PROJECT_ID"
            FINAL_CURSEFORGE_FILE_ID="${IN_CURSEFORGE_FILE_ID:-$CUR_CURSEFORGE_FILE_ID}"
            FINAL_JAR_URL=""
            FINAL_MRPACK_SLUG=""
            FINAL_MRPACK_VERSION=""
          else
            FINAL_SOURCE_TYPE="$CUR_SOURCE_TYPE"
            FINAL_JAR_URL="$CUR_JAR_URL"
            FINAL_MRPACK_SLUG="$CUR_MRPACK_SLUG"
            FINAL_MRPACK_VERSION="$CUR_MRPACK_VERSION"
            FINAL_CURSEFORGE_PROJECT_ID="$CUR_CURSEFORGE_PROJECT_ID"
            FINAL_CURSEFORGE_FILE_ID="$CUR_CURSEFORGE_FILE_ID"
          fi

          # Ports no longer need to be globally unique: each modpack runs on
          # its own isolated GitHub Actions runner per session, and routing
          # is done by tunnel_address, not by port. The port only needs to
          # match whatever local port you pointed this modpack's tunnel at
          # in the playit.gg dashboard.

          # Guard against two modpacks accidentally sharing a tunnel_address,
          # since a shared playit.gg address would route traffic to whichever
          # modpack happens to bind it first.
          if [ -n "$FINAL_TUNNEL_ADDRESS" ]; then
            TUNNEL_CLASH=$(for f in modpacks/*/meta.json; do
              [ -f "$f" ] || continue
              OTHER_NAME=$(basename "$(dirname "$f")")
              [ "$OTHER_NAME" = "$NAME" ] && continue
              OTHER_TUNNEL=$(jq -r '.tunnel_address // ""' "$f")
              if [ -n "$OTHER_TUNNEL" ] && [ "$OTHER_TUNNEL" = "$FINAL_TUNNEL_ADDRESS" ]; then
                echo "$OTHER_NAME"
              fi
            done)
            if [ -n "$TUNNEL_CLASH" ]; then
              echo "::error::tunnel_address $FINAL_TUNNEL_ADDRESS is already used by modpack(s): $TUNNEL_CLASH. Each modpack needs its own playit.gg tunnel."
              exit 1
            fi
          fi

          cat > "$META" <<EOF
          {
            "java_version": "$FINAL_JAVA",
            "memory_gb": "$FINAL_MEM",
            "server_jar": "$FINAL_JAR",
            "launch_mode": "$FINAL_MODE",
            "start_script": "$FINAL_SCRIPT",
            "server_port": "$FINAL_PORT",
            "tunnel_address": "$FINAL_TUNNEL_ADDRESS",
            "source_type": "$FINAL_SOURCE_TYPE",
            "jar_url": "$FINAL_JAR_URL",
            "is_zip": "$FINAL_IS_ZIP",
            "mrpack_slug": "$FINAL_MRPACK_SLUG",
            "mrpack_version": "$FINAL_MRPACK_VERSION",
            "curseforge_project_id": "$FINAL_CURSEFORGE_PROJECT_ID",
            "curseforge_file_id": "$FINAL_CURSEFORGE_FILE_ID"
          }
          EOF
          echo "meta.json for $NAME -> source=$FINAL_SOURCE_TYPE java=$FINAL_JAVA mem=${FINAL_MEM}GB mode=$FINAL_MODE jar=$FINAL_JAR script=$FINAL_SCRIPT port=$FINAL_PORT tunnel=${FINAL_TUNNEL_ADDRESS:-<none set>}"
          if [ "$ACTION" = "create" ] && [ -z "$FINAL_TUNNEL_ADDRESS" ]; then
            echo "::warning::No tunnel_address set for '$NAME'. Set up a playit.gg tunnel for port $FINAL_PORT and add it with /modpack configure name: $NAME tunnel_address: <address>, or players won't know where to connect."
          fi

      - name: Create - commit
        if: github.event.inputs.action == 'create'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          git add "modpacks/$NAME"
          git commit -m "modpack: create '$NAME'"
          git pull --rebase --autostash --quiet
          git push origin HEAD:main

      # ---------------- CONFIGURE ----------------
      - name: Configure - commit
        if: github.event.inputs.action == 'configure'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          git add "modpacks/$NAME/meta.json"
          git diff --staged --quiet && { echo "No changes."; exit 0; }
          git commit -m "modpack: configure '$NAME' (java=${{ github.event.inputs.java_version }}, mem=${{ github.event.inputs.memory_gb }}GB)"
          git pull --rebase --autostash --quiet
          git push origin HEAD:main

      # ---------------- DELETE ----------------
      - name: Delete - remove files
        if: github.event.inputs.action == 'delete'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          if [ ! -d "modpacks/$NAME" ]; then
            echo "::error::modpacks/$NAME does not exist."
            exit 1
          fi
          git rm -r --quiet "modpacks/$NAME"

          if [ "${{ github.event.inputs.delete_world }}" = "true" ] && [ -d "worlds/$NAME" ]; then
            git rm -r --quiet "worlds/$NAME"
          fi

      - name: Delete - commit
        if: github.event.inputs.action == 'delete'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          git diff --staged --quiet && { echo "No changes."; exit 0; }
          git commit -m "modpack: delete '$NAME'"
          git pull --rebase --autostash --quiet
          git push origin HEAD:main

      - name: Summary
        if: always()
        run: |
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Modpack: ${{ github.event.inputs.modpack_name }}"