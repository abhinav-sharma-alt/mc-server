name: Manage Modpack

# Create, reconfigure, or delete a modpack definition under modpacks/<name>/.
# Triggered by the Discord bot's /modpack command (authored-user only — enforced
# in the bot, not here, so don't expose this workflow_dispatch to anyone else
# with repo write access without adding your own guard).

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        type: choice
        options:
          - create
          - configure
          - delete
      modpack_name:
        description: 'Short id, lowercase, no spaces (e.g. atm9)'
        required: true
      jar_url:
        description: 'Direct download URL for server jar OR a server-pack .zip (create only). Leave blank if using mrpack_slug instead.'
        required: false
      is_zip:
        description: 'Is jar_url a .zip server pack that needs extracting? (create only)'
        required: false
        type: boolean
        default: false
      mrpack_slug:
        description: 'Modrinth modpack slug or project id, e.g. cobbleverse (create only). Alternative to jar_url — builds the server via mrpack-install instead.'
        required: false
      mrpack_version:
        description: 'Specific Modrinth version number/id for mrpack_slug (create only). Leave blank for latest.'
        required: false
      server_port:
        description: 'Minecraft server port (create: defaults to 25565 if blank. configure: leave blank to keep current value). Must be unique per modpack — pick one not already used by another modpack, and make sure you have a playit.gg tunnel configured for it.'
        required: false
      java_version:
        description: 'Java version (create: defaults to 25 if blank. configure: leave blank to keep current value)'
        required: false
      memory_gb:
        description: 'Xmx memory in GB (create: defaults to 10 if blank. configure: leave blank to keep current value). Runner has 16GB total.'
        required: false
      server_jar:
        description: 'Runnable jar filename, jar mode only (create: defaults to server.jar if blank. configure: leave blank to keep current value)'
        required: false
      launch_mode:
        description: 'jar (java -jar, default) or script (run a shipped start.sh). Blank on configure keeps current value.'
        required: false
        type: choice
        options:
          - ''
          - jar
          - script
      start_script:
        description: 'Script filename for script mode, e.g. start.sh (create: defaults to start.sh if blank. configure: leave blank to keep current value)'
        required: false
      delete_world:
        description: 'Also delete the saved world data? (delete only)'
        required: false
        type: boolean
        default: false

jobs:
  manage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "minecraft-bot"
          git config user.email "actions@github.com"
          git config core.fileMode false

      - name: Validate modpack name
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          ACTION="${{ github.event.inputs.action }}"
          if ! [[ "$NAME" =~ ^[a-z0-9][a-z0-9_-]*$ ]]; then
            echo "::error::modpack_name must be lowercase alphanumeric (with - or _), got: $NAME"
            exit 1
          fi
          if [ "$NAME" = "vanilla" ] && { [ "$ACTION" = "create" ] || [ "$ACTION" = "delete" ]; }; then
            echo "::error::'vanilla' has dynamic version-download logic baked into start-server.yml — it can't be created or deleted this way. 'configure' (memory/java) is fine."
            exit 1
          fi

      # ---------------- CREATE ----------------
      - name: Create - fetch jar / server pack
        if: github.event.inputs.action == 'create'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          JAR_URL="${{ github.event.inputs.jar_url }}"
          IS_ZIP="${{ github.event.inputs.is_zip }}"

          MRPACK_SLUG="${{ github.event.inputs.mrpack_slug }}"

          if [ -d "modpacks/$NAME" ]; then
            echo "::error::modpacks/$NAME already exists. Use 'configure' to change it, or delete it first."
            exit 1
          fi
          if [ -z "$JAR_URL" ] && [ -z "$MRPACK_SLUG" ]; then
            echo "::error::Provide either jar_url or mrpack_slug for 'create'."
            exit 1
          fi
          if [ -n "$JAR_URL" ] && [ -n "$MRPACK_SLUG" ]; then
            echo "::error::Provide only one of jar_url or mrpack_slug, not both."
            exit 1
          fi

          mkdir -p "modpacks/$NAME"

          if [ -n "$MRPACK_SLUG" ]; then
            echo "Using mrpack-install for Modrinth pack: $MRPACK_SLUG"
            exit 0   # actual install happens in the next step
          fi

          if [ "$IS_ZIP" = "true" ]; then
            curl -L -o /tmp/pack.zip "$JAR_URL"
            unzip -q /tmp/pack.zip -d "modpacks/$NAME"
            # Server packs often nest one level deep - flatten if so
            INNER=$(find "modpacks/$NAME" -mindepth 1 -maxdepth 1 -type d | head -n1)
            if [ -n "$INNER" ] && [ -z "$(find "modpacks/$NAME" -mindepth 1 -maxdepth 1 -type f)" ]; then
              mv "$INNER"/* "modpacks/$NAME"/
              rmdir "$INNER"
            fi
          else
            curl -L -o "modpacks/$NAME/server.jar" "$JAR_URL"
          fi

          echo "eula=true" > "modpacks/$NAME/eula.txt"

          if [ ! -f "modpacks/$NAME/server.properties" ]; then
            cat > "modpacks/$NAME/server.properties" <<'EOF'
          motd=A Minecraft Server
          max-players=20
          view-distance=10
          difficulty=normal
          gamemode=survival
          online-mode=true
          EOF
          fi

      - name: Create - install via mrpack-install (Modrinth slug path)
        if: github.event.inputs.action == 'create' && github.event.inputs.mrpack_slug != ''
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          SLUG="${{ github.event.inputs.mrpack_slug }}"
          VERSION="${{ github.event.inputs.mrpack_version }}"

          mkdir -p "modpacks/$NAME"

          echo "Downloading mrpack-install..."
          MRPACK_URL=$(curl -s https://api.github.com/repos/nothub/mrpack-install/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux"; "i")) | .browser_download_url' | head -n1)
          if [ -z "$MRPACK_URL" ]; then
            echo "::error::Could not find a Linux mrpack-install asset in the latest release."
            exit 1
          fi
          curl -sSL -o /tmp/mrpack-install "$MRPACK_URL"
          chmod +x /tmp/mrpack-install

          echo "Running mrpack-install for $SLUG ${VERSION:+(version $VERSION)}..."
          if [ -n "$VERSION" ]; then
            /tmp/mrpack-install "$SLUG" "$VERSION" --server-dir "modpacks/$NAME"
          else
            /tmp/mrpack-install "$SLUG" --server-dir "modpacks/$NAME"
          fi

          echo "eula=true" > "modpacks/$NAME/eula.txt"

          if [ ! -f "modpacks/$NAME/server.properties" ]; then
            cat > "modpacks/$NAME/server.properties" <<'EOF'
          motd=A Minecraft Server
          max-players=20
          view-distance=10
          difficulty=normal
          gamemode=survival
          online-mode=true
          EOF
          fi

          # mrpack-install names the runnable jar differently depending on loader
          # (e.g. fabric-server-launch.jar, forge server jar with a version suffix,
          # etc.). Detect it so the meta.json step below picks the right default
          # instead of assuming "server.jar".
          DETECTED_JAR=$(find "modpacks/$NAME" -maxdepth 1 -name "*.jar" \
            ! -iname "*installer*" | head -n1 | xargs -r basename)
          if [ -n "$DETECTED_JAR" ]; then
            echo "Detected server jar: $DETECTED_JAR"
            echo "$DETECTED_JAR" > "modpacks/$NAME/.detected_jar"
          else
            echo "::warning::Could not auto-detect a server jar in modpacks/$NAME. You may need to set server_jar manually via /modpack configure after checking the folder contents."
          fi

      # ---------------- CREATE + CONFIGURE (shared meta.json step) ----------------
      - name: Write meta.json
        if: github.event.inputs.action == 'create' || github.event.inputs.action == 'configure'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          ACTION="${{ github.event.inputs.action }}"
          META="modpacks/$NAME/meta.json"

          if [ "$ACTION" = "configure" ] && [ ! -d "modpacks/$NAME" ]; then
            echo "::error::modpacks/$NAME does not exist. Use 'create' first."
            exit 1
          fi
          mkdir -p "modpacks/$NAME"

          # Start from existing meta.json if present (configure), else hardcoded defaults (create)
          if [ -f "$META" ]; then
            CUR_JAVA=$(jq -r '.java_version // "25"' "$META")
            CUR_MEM=$(jq -r '.memory_gb // "10"' "$META")
            CUR_JAR=$(jq -r '.server_jar // "server.jar"' "$META")
            CUR_MODE=$(jq -r '.launch_mode // "jar"' "$META")
            CUR_SCRIPT=$(jq -r '.start_script // "start.sh"' "$META")
            CUR_PORT=$(jq -r '.server_port // "25565"' "$META")
          else
            CUR_JAVA="25"
            CUR_MEM="10"
            CUR_JAR="server.jar"
            CUR_MODE="jar"
            CUR_SCRIPT="start.sh"
            CUR_PORT="25565"
          fi

          # If mrpack-install auto-detected a jar filename, use it as the default
          # (still overridable by an explicit server_jar input below).
          if [ -f "modpacks/$NAME/.detected_jar" ]; then
            CUR_JAR=$(cat "modpacks/$NAME/.detected_jar")
            rm -f "modpacks/$NAME/.detected_jar"
          fi

          # Only override a field if the corresponding input was actually provided
          IN_JAVA="${{ github.event.inputs.java_version }}"
          IN_MEM="${{ github.event.inputs.memory_gb }}"
          IN_JAR="${{ github.event.inputs.server_jar }}"
          IN_MODE="${{ github.event.inputs.launch_mode }}"
          IN_SCRIPT="${{ github.event.inputs.start_script }}"
          IN_PORT="${{ github.event.inputs.server_port }}"

          FINAL_JAVA="${IN_JAVA:-$CUR_JAVA}"
          FINAL_MEM="${IN_MEM:-$CUR_MEM}"
          FINAL_JAR="${IN_JAR:-$CUR_JAR}"
          FINAL_MODE="${IN_MODE:-$CUR_MODE}"
          FINAL_SCRIPT="${IN_SCRIPT:-$CUR_SCRIPT}"
          FINAL_PORT="${IN_PORT:-$CUR_PORT}"

          # Guard against two modpacks accidentally sharing a port
          CLASH=$(for f in modpacks/*/meta.json; do
            [ -f "$f" ] || continue
            OTHER_NAME=$(basename "$(dirname "$f")")
            [ "$OTHER_NAME" = "$NAME" ] && continue
            OTHER_PORT=$(jq -r '.server_port // "25565"' "$f")
            if [ "$OTHER_PORT" = "$FINAL_PORT" ]; then
              echo "$OTHER_NAME"
            fi
          done)
          if [ -n "$CLASH" ]; then
            echo "::error::server_port $FINAL_PORT is already used by modpack(s): $CLASH. Pick a different port."
            exit 1
          fi

          cat > "$META" <<EOF
          {
            "java_version": "$FINAL_JAVA",
            "memory_gb": "$FINAL_MEM",
            "server_jar": "$FINAL_JAR",
            "launch_mode": "$FINAL_MODE",
            "start_script": "$FINAL_SCRIPT",
            "server_port": "$FINAL_PORT"
          }
          EOF
          echo "meta.json for $NAME -> java=$FINAL_JAVA mem=${FINAL_MEM}GB mode=$FINAL_MODE jar=$FINAL_JAR script=$FINAL_SCRIPT port=$FINAL_PORT"

      - name: Create - add to start-server.yml dropdown
        if: github.event.inputs.action == 'create'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          if grep -qE "^\s+- ${NAME}$" .github/workflows/start-server.yml; then
            echo "'$NAME' already listed in start-server.yml, skipping."
          else
            # Insert right after the "options:" line under the modpack input
            sed -i "/^\s*options:$/a\\          - ${NAME}" .github/workflows/start-server.yml
          fi

      - name: Create - commit
        if: github.event.inputs.action == 'create'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          git add "modpacks/$NAME" .github/workflows/start-server.yml
          git commit -m "modpack: create '$NAME'"
          git pull --rebase --autostash --quiet
          git push origin HEAD:main

      # ---------------- CONFIGURE ----------------
      - name: Configure - commit
        if: github.event.inputs.action == 'configure'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          git add "modpacks/$NAME/meta.json"
          git diff --staged --quiet && { echo "No changes."; exit 0; }
          git commit -m "modpack: configure '$NAME' (java=${{ github.event.inputs.java_version }}, mem=${{ github.event.inputs.memory_gb }}GB)"
          git pull --rebase --autostash --quiet
          git push origin HEAD:main

      # ---------------- DELETE ----------------
      - name: Delete - remove files
        if: github.event.inputs.action == 'delete'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          if [ ! -d "modpacks/$NAME" ]; then
            echo "::error::modpacks/$NAME does not exist."
            exit 1
          fi
          git rm -r --quiet "modpacks/$NAME"

          if [ "${{ github.event.inputs.delete_world }}" = "true" ] && [ -d "worlds/$NAME" ]; then
            git rm -r --quiet "worlds/$NAME"
          fi

          # Remove from start-server.yml dropdown
          sed -i "/^\s*- ${NAME}$/d" .github/workflows/start-server.yml

      - name: Delete - commit
        if: github.event.inputs.action == 'delete'
        run: |
          NAME="${{ github.event.inputs.modpack_name }}"
          git add .github/workflows/start-server.yml
          git commit -m "modpack: delete '$NAME'"
          git pull --rebase --autostash --quiet
          git push origin HEAD:main

      - name: Summary
        if: always()
        run: |
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Modpack: ${{ github.event.inputs.modpack_name }}"