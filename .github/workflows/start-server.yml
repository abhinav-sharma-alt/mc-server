name: Start Minecraft Server

on:
  workflow_dispatch:
    inputs:
      modpack:
        description: 'Which server setup to launch: "vanilla" or a modpack name from modpacks/<name>/ (created via /modpack create)'
        required: true
        default: 'vanilla'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # ~5h50m, safely under the 6h hard limit
    permissions:
      contents: write

    steps:
      - name: Checkout repo (includes saved world)
        uses: actions/checkout@v4
        # NOTE: if `git status` ever shows server/server.properties or other
        # live server/ files as tracked, run this once locally and push it:
        #   git rm --cached server/server.properties
        #   echo "server/" >> .gitignore
        #   git add .gitignore && git commit -m "untrack live server/ dir"
        # The source of truth for properties is worlds/<modpack>/server.properties,
        # which is already copied in/out below.
        #
        # Mod/jar/resourcepack binaries are never committed (GitHub hard-rejects
        # files >100MB). modpacks/<name>/meta.json only records where to fetch
        # them from; they're downloaded fresh below on this ephemeral runner.

      - name: Read modpack config (java version / memory / source)
        id: modpack_meta
        run: |
          META="modpacks/${{ github.event.inputs.modpack }}/meta.json"
          if [ -f "$META" ]; then
            JAVA_VERSION=$(jq -r '.java_version // "25"' "$META")
            MEMORY_GB=$(jq -r '.memory_gb // "10"' "$META")
            SERVER_JAR=$(jq -r '.server_jar // "server.jar"' "$META")
            LAUNCH_MODE=$(jq -r '.launch_mode // "jar"' "$META")
            START_SCRIPT=$(jq -r '.start_script // "start.sh"' "$META")
            SERVER_PORT=$(jq -r '.server_port // "25565"' "$META")
            SOURCE_TYPE=$(jq -r '.source_type // "jar"' "$META")
            JAR_URL=$(jq -r '.jar_url // ""' "$META")
            MRPACK_SLUG=$(jq -r '.mrpack_slug // ""' "$META")
            MRPACK_VERSION=$(jq -r '.mrpack_version // ""' "$META")
            TUNNEL_ADDRESS=$(jq -r '.tunnel_address // ""' "$META")
            CURSEFORGE_PROJECT_ID=$(jq -r '.curseforge_project_id // ""' "$META")
            CURSEFORGE_FILE_ID=$(jq -r '.curseforge_file_id // ""' "$META")
          else
            JAVA_VERSION="25"
            MEMORY_GB="10"
            SERVER_JAR="server.jar"
            LAUNCH_MODE="jar"
            START_SCRIPT="start.sh"
            SERVER_PORT="25565"
            SOURCE_TYPE="jar"
            JAR_URL=""
            MRPACK_SLUG=""
            MRPACK_VERSION=""
            TUNNEL_ADDRESS=""
            CURSEFORGE_PROJECT_ID=""
            CURSEFORGE_FILE_ID=""
          fi
          if [ -z "$TUNNEL_ADDRESS" ]; then
            echo "::warning::No tunnel_address configured for '${{ github.event.inputs.modpack }}'. Set one with /modpack configure name: ${{ github.event.inputs.modpack }} tunnel_address: <your-playit-address>."
          fi
          echo "java_version=$JAVA_VERSION" >> "$GITHUB_OUTPUT"
          echo "memory_gb=$MEMORY_GB" >> "$GITHUB_OUTPUT"
          echo "server_jar=$SERVER_JAR" >> "$GITHUB_OUTPUT"
          echo "launch_mode=$LAUNCH_MODE" >> "$GITHUB_OUTPUT"
          echo "start_script=$START_SCRIPT" >> "$GITHUB_OUTPUT"
          echo "server_port=$SERVER_PORT" >> "$GITHUB_OUTPUT"
          echo "source_type=$SOURCE_TYPE" >> "$GITHUB_OUTPUT"
          echo "jar_url=$JAR_URL" >> "$GITHUB_OUTPUT"
          echo "mrpack_slug=$MRPACK_SLUG" >> "$GITHUB_OUTPUT"
          echo "mrpack_version=$MRPACK_VERSION" >> "$GITHUB_OUTPUT"
          echo "tunnel_address=$TUNNEL_ADDRESS" >> "$GITHUB_OUTPUT"
          echo "curseforge_project_id=$CURSEFORGE_PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "curseforge_file_id=$CURSEFORGE_FILE_ID" >> "$GITHUB_OUTPUT"

      - name: Announce tunnel address
        run: |
          echo "### 🔌 Connect address" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.modpack_meta.outputs.tunnel_address }}" ]; then
            echo "**${{ steps.modpack_meta.outputs.tunnel_address }}**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No tunnel_address configured for this modpack — set one with \`/modpack configure name: ${{ github.event.inputs.modpack }} tunnel_address: <address>\`._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '${{ steps.modpack_meta.outputs.java_version }}'

      - name: Download vanilla server jar (pinned version)
        if: github.event.inputs.modpack == 'vanilla'
        env:
          MC_VERSION: "26.2"
        run: |
          VERSION_MANIFEST=$(curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json)
          VERSION_URL=$(echo "$VERSION_MANIFEST" | jq -r ".versions[] | select(.id==\"$MC_VERSION\") | .url")
          SERVER_URL=$(curl -s "$VERSION_URL" | jq -r '.downloads.server.url')
          mkdir -p server
          curl -o server/server.jar "$SERVER_URL"

      - name: Build server directory for modpack (fetch fresh — nothing is committed)
        id: build_modpack
        if: github.event.inputs.modpack != 'vanilla'
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          MODPACK="${{ github.event.inputs.modpack }}"
          if [ ! -d "modpacks/$MODPACK" ]; then
            echo "::error::modpacks/$MODPACK does not exist. Create it first with /modpack create."
            exit 1
          fi

          SOURCE_TYPE="${{ steps.modpack_meta.outputs.source_type }}"
          JAR_URL="${{ steps.modpack_meta.outputs.jar_url }}"
          MRPACK_SLUG="${{ steps.modpack_meta.outputs.mrpack_slug }}"
          MRPACK_VERSION="${{ steps.modpack_meta.outputs.mrpack_version }}"
          CURSEFORGE_PROJECT_ID="${{ steps.modpack_meta.outputs.curseforge_project_id }}"
          CURSEFORGE_FILE_ID="${{ steps.modpack_meta.outputs.curseforge_file_id }}"
          SERVER_JAR="${{ steps.modpack_meta.outputs.server_jar }}"

          mkdir -p server
          # small tracked config (server.properties template etc), never the mods
          cp -r "modpacks/$MODPACK"/* server/ 2>/dev/null || true

          RESOLVED_JAR="$SERVER_JAR"

          case "$SOURCE_TYPE" in
            jar)
              if [ -z "$JAR_URL" ]; then
                echo "::error::meta.json has source_type=jar but no jar_url set. Fix with /modpack configure."
                exit 1
              fi
              curl -L -o "server/$SERVER_JAR" "$JAR_URL"
              ;;

            zip)
              if [ -z "$JAR_URL" ]; then
                echo "::error::meta.json has source_type=zip but no jar_url set. Fix with /modpack configure."
                exit 1
              fi
              curl -L -o /tmp/pack.zip "$JAR_URL"
              unzip -q /tmp/pack.zip -d server
              # Server packs often nest one level deep - flatten if so
              INNER=$(find server -mindepth 1 -maxdepth 1 -type d | head -n1)
              if [ -n "$INNER" ] && [ -z "$(find server -mindepth 1 -maxdepth 1 -type f)" ]; then
                mv "$INNER"/* server/
                rmdir "$INNER"
              fi
              ;;

            mrpack)
              if [ -z "$MRPACK_SLUG" ]; then
                echo "::error::meta.json has source_type=mrpack but no mrpack_slug set. Fix with /modpack configure."
                exit 1
              fi
              echo "Downloading mrpack-install..."
              MRPACK_URL=$(curl -s https://api.github.com/repos/nothub/mrpack-install/releases/latest \
                | jq -r '.assets[] | select(.name | test("linux"; "i")) | .browser_download_url' | head -n1)
              if [ -z "$MRPACK_URL" ]; then
                echo "::error::Could not find a Linux mrpack-install asset in the latest release."
                exit 1
              fi
              curl -sSL -o /tmp/mrpack-install "$MRPACK_URL"
              chmod +x /tmp/mrpack-install

              echo "Running mrpack-install for $MRPACK_SLUG ${MRPACK_VERSION:+(version $MRPACK_VERSION)}..."
              if [ -n "$MRPACK_VERSION" ]; then
                /tmp/mrpack-install "$MRPACK_SLUG" "$MRPACK_VERSION" --server-dir server
              else
                /tmp/mrpack-install "$MRPACK_SLUG" --server-dir server
              fi

              # mrpack-install names the runnable jar differently depending on loader
              # (e.g. fabric-server-launch.jar, forge server jar with a version suffix,
              # etc). Prefer the configured server_jar if it happens to exist; otherwise
              # auto-detect.
              if [ ! -f "server/$SERVER_JAR" ]; then
                DETECTED_JAR=$(find server -maxdepth 1 -name "*.jar" ! -iname "*installer*" | head -n1 | xargs -r basename)
                if [ -n "$DETECTED_JAR" ]; then
                  echo "Auto-detected server jar: $DETECTED_JAR (configured server_jar '$SERVER_JAR' not found)"
                  RESOLVED_JAR="$DETECTED_JAR"
                fi
              fi
              ;;

            curseforge)
              if [ -z "$CURSEFORGE_PROJECT_ID" ]; then
                echo "::error::meta.json has source_type=curseforge but no curseforge_project_id set. Fix with /modpack configure."
                exit 1
              fi
              if [ -z "$CURSEFORGE_API_KEY" ]; then
                echo "::error::CURSEFORGE_API_KEY repo secret is not set. Get a key at https://console.curseforge.com/#/api-keys and add it under repo Settings > Secrets and variables > Actions."
                exit 1
              fi

              CF_AUTH=(-H "x-api-key: $CURSEFORGE_API_KEY" -H "Accept: application/json")

              RESOLVED_FILE_ID="$CURSEFORGE_FILE_ID"
              if [ -z "$RESOLVED_FILE_ID" ]; then
                echo "No curseforge_file_id set — looking up the latest file for project $CURSEFORGE_PROJECT_ID..."
                RESOLVED_FILE_ID=$(curl -s "${CF_AUTH[@]}" \
                  "https://api.curseforge.com/v1/mods/$CURSEFORGE_PROJECT_ID/files?pageSize=1" \
                  | jq -r '.data[0].id // empty')
                if [ -z "$RESOLVED_FILE_ID" ]; then
                  echo "::error::Could not find any files for CurseForge project $CURSEFORGE_PROJECT_ID. Double-check the project id (it's numeric, found on the project's CurseForge page under 'About Project')."
                  exit 1
                fi
              fi

              # Prefer the dedicated server pack file if this file has one —
              # the main file is usually the client pack and won't run headless.
              FILE_INFO=$(curl -s "${CF_AUTH[@]}" "https://api.curseforge.com/v1/mods/$CURSEFORGE_PROJECT_ID/files/$RESOLVED_FILE_ID")
              SERVER_PACK_ID=$(echo "$FILE_INFO" | jq -r '.data.serverPackFileId // empty')
              DOWNLOAD_FILE_ID="$RESOLVED_FILE_ID"
              if [ -n "$SERVER_PACK_ID" ] && [ "$SERVER_PACK_ID" != "null" ]; then
                echo "File $RESOLVED_FILE_ID has a dedicated server pack — using file $SERVER_PACK_ID instead."
                DOWNLOAD_FILE_ID="$SERVER_PACK_ID"
              else
                echo "No dedicated server pack for file $RESOLVED_FILE_ID — downloading it directly. If the server fails to start, this modpack may only publish a client pack; check the project's Files page for a separate server-files download and use jar_url + is_zip instead."
              fi

              DOWNLOAD_URL=$(curl -s "${CF_AUTH[@]}" \
                "https://api.curseforge.com/v1/mods/$CURSEFORGE_PROJECT_ID/files/$DOWNLOAD_FILE_ID/download-url" \
                | jq -r '.data // empty')
              if [ -z "$DOWNLOAD_URL" ]; then
                echo "::error::Could not resolve a download URL for file $DOWNLOAD_FILE_ID. The author may have disabled third-party downloads for this project — download the server pack zip yourself and use jar_url + is_zip instead."
                exit 1
              fi

              curl -L -o /tmp/pack.zip "$DOWNLOAD_URL"
              unzip -q /tmp/pack.zip -d server
              # Server packs often nest one level deep - flatten if so
              INNER=$(find server -mindepth 1 -maxdepth 1 -type d | head -n1)
              if [ -n "$INNER" ] && [ -z "$(find server -mindepth 1 -maxdepth 1 -type f)" ]; then
                mv "$INNER"/* server/
                rmdir "$INNER"
              fi

              # Forge/NeoForge CurseForge server packs commonly ship an
              # installer jar instead of a ready-to-run server — run it once
              # to generate the real launch files before we look for a jar/script.
              INSTALLER_JAR=$(find server -maxdepth 1 -iname "*installer*.jar" | head -n1)
              if [ -n "$INSTALLER_JAR" ]; then
                echo "Found installer jar $(basename "$INSTALLER_JAR") — running it to generate the server..."
                (cd server && java -jar "$(basename "$INSTALLER_JAR")" --installServer)
              fi

              if [ ! -f "server/$SERVER_JAR" ]; then
                DETECTED_JAR=$(find server -maxdepth 1 -name "*.jar" ! -iname "*installer*" | head -n1 | xargs -r basename)
                if [ -n "$DETECTED_JAR" ]; then
                  echo "Auto-detected server jar: $DETECTED_JAR (configured server_jar '$SERVER_JAR' not found)"
                  RESOLVED_JAR="$DETECTED_JAR"
                fi
              fi
              ;;

            *)
              echo "::error::Unknown source_type '$SOURCE_TYPE' in meta.json."
              exit 1
              ;;
          esac

          echo "eula=true" > server/eula.txt

          if [ ! -f "server/server.properties" ]; then
            cat > server/server.properties <<'EOF'
          motd=A Minecraft Server
          max-players=20
          view-distance=10
          difficulty=normal
          gamemode=survival
          online-mode=false
          EOF
          fi

          echo "resolved_server_jar=$RESOLVED_JAR" >> "$GITHUB_OUTPUT"

          LAUNCH_MODE="${{ steps.modpack_meta.outputs.launch_mode }}"
          if [ "$LAUNCH_MODE" = "script" ]; then
            START_SCRIPT="${{ steps.modpack_meta.outputs.start_script }}"
            if [ ! -f "server/$START_SCRIPT" ]; then
              echo "::error::server/$START_SCRIPT not found after building modpacks/$MODPACK."
              echo "Files actually present in server/:"
              find server -maxdepth 1 \( -name "*.sh" -o -name "*.jar" \)
              echo "Set the right one with:"
              echo "  /modpack configure name: $MODPACK launch_mode: script start_script: <actual-filename>.sh"
              exit 1
            fi
            chmod +x "server/$START_SCRIPT"
          else
            if [ ! -f "server/$RESOLVED_JAR" ]; then
              echo "::error::server/$RESOLVED_JAR not found after building modpacks/$MODPACK."
              echo "Files actually present in server/:"
              find server -maxdepth 1 \( -name "*.jar" -o -name "*.sh" \)
              echo "If there's a .sh launcher instead of a plain jar, this modpack needs script mode:"
              echo "  /modpack configure name: $MODPACK launch_mode: script start_script: <actual-filename>.sh"
              echo "Otherwise, if the jar just has a different name:"
              echo "  /modpack configure name: $MODPACK server_jar: <actual-filename>.jar"
              exit 1
            fi
          fi

      - name: Accept EULA (vanilla)
        if: github.event.inputs.modpack == 'vanilla'
        run: echo "eula=true" > server/eula.txt

      - name: Debug - inspect world dir origin
        if: github.event.inputs.modpack != 'vanilla'
        run: |
          echo "=== server/ top level ==="
          ls -la server/
          echo "=== server/world (if exists) ==="
          if [ -d server/world ]; then
            find server/world -maxdepth 2
            if [ -f server/world/level.dat ]; then
              echo "level.dat size:"
              stat -c%s server/world/level.dat
            fi
          else
            echo "no server/world at this point"
          fi

      - name: Ensure clean world dir if no real saved world exists (modpacks only)
        if: github.event.inputs.modpack != 'vanilla'
        run: |
          if [ -d server/world ] && [ ! -d "worlds/${{ github.event.inputs.modpack }}/world" ]; then
            echo "No real saved world for ${{ github.event.inputs.modpack }} yet — server/world is likely a template from mrpack overrides. Clearing it so the server generates a real one."
            rm -rf server/world
          fi

      - name: Restore saved world for this modpack (if it exists)
        run: |
          mkdir -p "worlds/${{ github.event.inputs.modpack }}"
          if [ -d "worlds/${{ github.event.inputs.modpack }}/world" ]; then
            rm -rf server/world
            cp -r "worlds/${{ github.event.inputs.modpack }}/world" server/world
            rm -f server/world/session.lock
          fi
          if [ -f "worlds/${{ github.event.inputs.modpack }}/server.properties" ]; then
            cp "worlds/${{ github.event.inputs.modpack }}/server.properties" server/server.properties
          fi

      - name: Enforce configured server-port in server.properties
        run: |
          SERVER_PORT="${{ steps.modpack_meta.outputs.server_port }}"
          touch server/server.properties
          sed -i '/^server-port=/d' server/server.properties
          echo "server-port=$SERVER_PORT" >> server/server.properties

      - name: Force online-mode=false (allow cracked players on every modpack/vanilla)
        run: |
          touch server/server.properties
          sed -i '/^online-mode=/d' server/server.properties
          echo "online-mode=false" >> server/server.properties

      - name: Configure git identity for console polling
        run: |
          git config user.name "minecraft-bot"
          git config user.email "actions@github.com"
          git config core.fileMode false

      - name: Start playit tunnel and Minecraft server
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
          MODPACK: ${{ github.event.inputs.modpack }}
          MEMORY_GB: ${{ steps.modpack_meta.outputs.memory_gb }}
          SERVER_JAR: ${{ github.event.inputs.modpack == 'vanilla' && steps.modpack_meta.outputs.server_jar || steps.build_modpack.outputs.resolved_server_jar }}
          LAUNCH_MODE: ${{ steps.modpack_meta.outputs.launch_mode }}
          START_SCRIPT: ${{ steps.modpack_meta.outputs.start_script }}
          SERVER_PORT: ${{ steps.modpack_meta.outputs.server_port }}
          TUNNEL_ADDRESS: ${{ steps.modpack_meta.outputs.tunnel_address }}
        run: |
          chmod +x scripts/run-session.sh
          ./scripts/run-session.sh

      - name: Upload crash reports and logs (for debugging failed starts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-${{ github.event.inputs.modpack }}-${{ github.run_id }}
          path: |
            server/crash-reports/*.txt
            server/logs/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated world back to repo
        if: always()
        run: |
          git config user.name "minecraft-bot"
          git config user.email "actions@github.com"
          if [ -d "server/world" ]; then
            # Guard against saving a corrupted world over a good one. A
            # healthy level.dat is normally several KB (it holds the seed,
            # dimension data, gamerules, etc); if it's missing or tiny, the
            # server likely never finished a proper save this session (e.g.
            # was killed uncleanly) — pushing it would silently brick the
            # world for every future session, exactly like a truncated
            # level.dat that fails to parse on next boot with errors like
            # "No key dimensions in MapLike[{}]".
            LEVEL_DAT_SIZE=0
            [ -f "server/world/level.dat" ] && LEVEL_DAT_SIZE=$(stat -c%s "server/world/level.dat" 2>/dev/null || echo 0)
            if [ "$LEVEL_DAT_SIZE" -lt 1000 ]; then
              echo "::error::server/world/level.dat is missing or only ${LEVEL_DAT_SIZE} bytes — this looks like a corrupted/incomplete save, not a real world. Refusing to overwrite the last saved world for ${{ github.event.inputs.modpack }} with this. If the server never started properly this session, that's expected and fine; if it did run and this still happened, please report it — do not just re-run without investigating, or a future run could still push a bad save before this check catches it."
              exit 1
            fi

            mkdir -p "worlds/${{ github.event.inputs.modpack }}"
            rm -rf "worlds/${{ github.event.inputs.modpack }}/world"
            cp -r server/world "worlds/${{ github.event.inputs.modpack }}/world"
            rm -f "worlds/${{ github.event.inputs.modpack }}/world/session.lock"
            cp server/server.properties "worlds/${{ github.event.inputs.modpack }}/server.properties"
            # Stage only the world data and console signal files (the latter
            # in case the console poller left command.txt/stop.txt
            # modified-but-uncommitted when it was stopped).
            # NEVER "git add -A" here — server/ contains freshly-downloaded
            # mod jars/resourcepacks (can be 100MB+) that must never be
            # committed; GitHub hard-rejects pushes with files over 100MB.
            git add "worlds/${{ github.event.inputs.modpack }}" console/
            git diff --staged --quiet || git commit -m "Update ${{ github.event.inputs.modpack }} world state after session"

            # Retry push a few times in case something else pushed to main
            # while this session was running (another /console command's
            # signal-file commit, a /modpack configure, a manual push, etc).
            # We must NEVER silently drop the world update here — on a
            # rebase conflict we always keep THIS session's worlds/console
            # changes and defer to remote for everything else, then retry.
            PUSHED=false
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main --quiet 2>/dev/null; then
                PUSHED=true
                break
              fi
              echo "Push attempt $attempt failed (remote moved) — rebasing onto latest main..."
              git fetch origin main --quiet
              if git rebase origin/main --quiet 2>/dev/null; then
                continue
              fi
              echo "Rebase hit a conflict — keeping this session's world/console data, taking remote's version of everything else..."
              for f in $(git diff --name-only --diff-filter=U); do
                case "$f" in
                  worlds/*|console/*) git checkout --ours -- "$f" ;;
                  *) git checkout --theirs -- "$f" ;;
                esac
                git add "$f"
              done
              if ! GIT_EDITOR=true git rebase --continue --quiet; then
                git rebase --abort
                echo "::error::Could not auto-resolve a rebase conflict while saving the world."
                break
              fi
            done

            if [ "$PUSHED" != "true" ]; then
              echo "::error::Failed to push the world update for ${{ github.event.inputs.modpack }} after retries. The data is NOT lost yet — it exists in this run's git history — but was not saved to the repo. Check this log and push worlds/${{ github.event.inputs.modpack }} manually, or re-run and avoid pushing to main while a session is active."
              exit 1
            fi
          else
            echo "No server/world directory found — server likely never started successfully. Skipping commit."
          fi